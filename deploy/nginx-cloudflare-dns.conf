# cloudflare-dns-mcp vhost — dns-mcp.example.com -> 127.0.0.1:8783
# Co-located on the MCP host beside peer-mcp. Follows the /ai/<app>/nginx.conf house style:
#   - combined PHP7-CertBot pem (cert+chain+key in ONE file; same path for BOTH
#     ssl_certificate and ssl_certificate_key)
#   - the shared `include /opt/nginx/include/listenssl.conf;` (no hand-rolled TLS)
# cfmcp is a SAN on the auto-renewed combined cert NNN (the peer-mcp cert), so point
# both directives at that SAME .pem — do NOT issue a separate cert. New lab MCPs on
# this box = just another SAN on NNN, no vhost cert change.

server {
    server_name dns-mcp.example.com;

    # Combined cert+key pem (cert NNN, shared with peer-mcp). On the MCP host each app is
    # self-contained under /opt/<app>/, so the renew cron writes cert NNN here too.
    ssl_certificate     /opt/cloudflare-dns-mcp/etc/cloudflare-dns-mcp.pem;
    ssl_certificate_key /opt/cloudflare-dns-mcp/etc/cloudflare-dns-mcp.pem;
    include /opt/nginx/include/listenssl.conf;

    client_max_body_size 4m;

    # MCP streamable-HTTP: no buffering, long-lived, pass the operator bearer through.
    location / {
        proxy_pass         http://127.0.0.1:8783;
        proxy_http_version 1.1;
        proxy_buffering    off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        add_header         X-Accel-Buffering no;
        proxy_set_header   Authorization     $http_authorization;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Connection        "";
    }
}
